<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>GPS Location Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="manifest" href="manifest.json">
    <link rel="icon" sizes="192x192" href="icon-192.png">
    <link rel="icon" sizes="512x512" href="icon-512.png">
    <meta name="theme-color" content="#1976d2">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            background: #111827;
            color: #e5e7eb;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1rem;
            text-align: center;
            background: #020617;
            border-bottom: 1px solid #1f2937;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            gap: 0.75rem;
        }

        #locateBtn {
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            border: none;
            background: #2563eb;
            color: #f9fafb;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
            transition: background 0.15s ease, transform 0.1s ease, box-shadow 0.1s ease;
        }

        #locateBtn:active {
            transform: translateY(1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
        }

        #locateBtn:disabled {
            opacity: 0.6;
            cursor: default;
            box-shadow: none;
        }

        #status {
            min-height: 1.5rem;
            font-size: 0.9rem;
            color: #9ca3af;
        }

        #map {
            flex: 1;
            min-height: 300px;
            border-radius: 0.75rem;
            overflow: hidden;
            border: 1px solid #1f2937;
        }

        /* Leaflet dark-ish tweaks */
        .leaflet-container {
            background: #020617;
        }

        #historyContainer {
            margin-top: 1rem;
            padding: 1rem;
            background: #0f172a;
            border-radius: 0.75rem;
            border: 1px solid #1e293b;
        }

        #adjustUI {
            display: none;
            margin-top: 0.75rem;
        }

        #overlaySelect {
            font-size: 1.2rem;
            padding: 0.5rem;
            width: 100%;
            background: #334155;
            color: #f1f5f9;
            border: 1px solid #475569;
            border-radius: 0.5rem;
        }

        #startAdjustBtn {
            padding: 0.5rem 0.75rem;
            border: none;
            border-radius: 0.5rem;
            background: #2563eb;
            color: #f9fafb;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        #historyButtons {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        #copyBtn,
        #clearBtn,
        #exportSvgBtn {
            padding: 0.5rem 0.75rem;
            border: none;
            border-radius: 0.5rem;
            background: #334155;
            color: #f1f5f9;
            font-size: 0.9rem;
            cursor: pointer;
        }

        #copyBtn:active,
        #clearBtn:active {
            transform: translateY(1px);
        }
    </style>
</head>

<body>
    <header>
        <h1>GPS Location Tracker</h1>
    </header>

    <main>
        <button id="locateBtn">Locate Me</button>
        <div id="status"></div>
        <div id="map"></div>
        <div id="historyContainer">
            <h2>Recorded Locations</h2>

            <div id="historyButtons">
                <button id="exportSvgBtn">Export SVG file</button>
                <button id="uploadBtn">Upload SVG</button>
                <button id="adjustBtn">Adjust Bounds</button>
                <button id="clearBtn">Clear</button>
            </div>
            <div id="adjustUI">
                <select id="overlaySelect"></select>
                <button id="startAdjustBtn">Adjust Selected</button>
            </div>
            <button id="placeBtn" style="display:none; margin-top: 0.75rem;">Place SVG</button>
            <input type="file" id="uploadSvg" accept=".svg" style="display:none">
        </div>
    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        let map;
        let marker;
        let accuracyCircle;
        let pathLine;

        let historyPoints = [];
        let svgOverlays = [];
        let placementOverlay = null;
        let currentUploadedFile = null;
        let mapInitialized = false;

        // localStorage keys
        const STORAGE_KEY_SVG = 'storedSvgData';
        const STORAGE_KEY_BOUNDS = 'storedSvgBounds';
        let mapMoveHandler = () => {
            if (placementOverlay) {
                const bounds = map.getBounds();
                const centerLat = (bounds.getNorth() + bounds.getSouth()) / 2;
                const deltaLat = bounds.getNorth() - bounds.getSouth();
                const newDeltaLat = deltaLat * 1.3;
                const newNorth = centerLat + newDeltaLat / 2;
                const newSouth = centerLat - newDeltaLat / 2;
                const newBounds = [[newSouth, bounds.getWest()], [newNorth, bounds.getEast()]];
                placementOverlay.setBounds(newBounds);
            }
        };

        const statusEl = document.getElementById("status");
        const locateBtn = document.getElementById("locateBtn");
        const historyOutput = document.getElementById("historyOutput");
        const clearBtn = document.getElementById("clearBtn");
        const uploadBtn = document.getElementById("uploadBtn");
        const uploadSvg = document.getElementById("uploadSvg");
        const adjustBtn = document.getElementById("adjustBtn");
        const adjustUI = document.getElementById("adjustUI");
        const overlaySelect = document.getElementById("overlaySelect");
        const startAdjustBtn = document.getElementById("startAdjustBtn");
        const placeBtn = document.getElementById("placeBtn");
        // ensure dropdown accessible on mobile
        overlaySelect.addEventListener('touchstart', () => overlaySelect.size = svgOverlays.length);

        function exportSVG() {
            if (historyPoints.length < 2) return "";

            const width = 800;
            const height = 800;

            const lats = historyPoints.map(p => p.lat);
            const lngs = historyPoints.map(p => p.lng);

            const minLat = Math.min(...lats);
            const maxLat = Math.max(...lats);
            const minLng = Math.min(...lngs);
            const maxLng = Math.max(...lngs);

            const latRange = maxLat - minLat || 1;
            const lngRange = maxLng - minLng || 1;

            const points = historyPoints.map(p => {
                const x = ((p.lng - minLng) / lngRange) * width;
                const y = height - ((p.lat - minLat) / latRange) * height;
                return { x, y };
            });

            const pathData = points
                .map((pt, i) => (i === 0 ? `M ${pt.x} ${pt.y}` : `L ${pt.x} ${pt.y}`))
                .join(" ");

            return `
<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
    <path d="${pathData}" fill="none" stroke="#38bdf8" stroke-width="3" />
</svg>
    `.trim();
        }

        const exportSvgBtn = document.getElementById("exportSvgBtn");

        exportSvgBtn.addEventListener("click", () => {
            const svgText = exportSVG();
            if (!svgText) {
                alert("Not enough points to export.");
                return;
            }

            const blob = new Blob([svgText], { type: "image/svg+xml" });
            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = "track.svg";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            URL.revokeObjectURL(url);
        });


        function setStatus(message) {
            statusEl.textContent = message;
        }

        // Function to save SVG to localStorage
        function saveSvgToStorage(file, bounds) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const svgData = e.target.result;
                localStorage.setItem(STORAGE_KEY_SVG, svgData);
                localStorage.setItem(STORAGE_KEY_BOUNDS, JSON.stringify({
                    north: bounds.getNorth(),
                    south: bounds.getSouth(),
                    east: bounds.getEast(),
                    west: bounds.getWest()
                }));
            };
            reader.readAsDataURL(file);
        }

        // Function to restore SVG from localStorage
        function restoreSvgFromStorage() {
            const svgData = localStorage.getItem(STORAGE_KEY_SVG);
            const boundsData = localStorage.getItem(STORAGE_KEY_BOUNDS);

            if (!svgData || !boundsData) return false;

            const bounds = JSON.parse(boundsData);
            const leafletBounds = [[bounds.south, bounds.west], [bounds.north, bounds.east]];
            const overlay = L.imageOverlay(svgData, leafletBounds).addTo(map);
            svgOverlays.push(overlay);
            placementOverlay = overlay;
            map.on('move', mapMoveHandler);
            placeBtn.style.display = "inline";

            return true;
        }

        // Check on page load if we have a stored SVG
        function checkStoredSvg() {
            if (localStorage.getItem(STORAGE_KEY_SVG)) {
                if (confirm("Restore previously saved SVG?")) {
                    restoreSvgFromStorage();
                }
            }
        }

        function initMap(lat, lng) {
            if (!map) {
                map = L.map("map", {
                    zoomSnap: 0.01,
                    zoomDelta: 0.005
                }).setView([lat, lng], 16);

                L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
                    maxZoom: 24,
                    attribution: "&copy; OpenStreetMap contributors"
                }).addTo(map);

                // Create the trail line AFTER the map exists
                pathLine = L.polyline([], { color: "#38bdf8", weight: 4 }).addTo(map);

                // Check for stored SVG on first initialization
                if (!mapInitialized) {
                    mapInitialized = true;
                    checkStoredSvg();
                }
            }

            if (!marker) {
                marker = L.marker([lat, lng]).addTo(map);
            } else {
                marker.setLatLng([lat, lng]);
            }
        }

        function updateAccuracyCircle(lat, lng, accuracy) {
            if (!accuracyCircle) {
                accuracyCircle = L.circle([lat, lng], {
                    radius: accuracy,
                    color: "#60a5fa",
                    fillColor: "#3b82f6",
                    fillOpacity: 0.2
                }).addTo(map);
            } else {
                accuracyCircle.setLatLng([lat, lng]);
                accuracyCircle.setRadius(accuracy);
            }
        }

        function handlePosition(position) {
            const { latitude, longitude, accuracy } = position.coords;

            initMap(latitude, longitude);
            updateAccuracyCircle(latitude, longitude, accuracy);

            // Add to trail
            pathLine.addLatLng([latitude, longitude]);

            // Add to history list
            historyPoints.push({
                lat: latitude,
                lng: longitude,
                acc: accuracy,
                time: Date.now()
            });

            setStatus(
                `Lat: ${latitude.toFixed(5)}, Lng: ${longitude.toFixed(5)} (±${Math.round(accuracy)} m)`
            );
        }

        function handleError(error) {
            locateBtn.disabled = false;

            switch (error.code) {
                case error.PERMISSION_DENIED:
                    setStatus("Location permission denied.");
                    break;
                case error.POSITION_UNAVAILABLE:
                    setStatus("Location unavailable.");
                    break;
                case error.TIMEOUT:
                    setStatus("Location request timed out.");
                    break;
                default:
                    setStatus("Unknown error.");
            }
        }

        function startTracking() {
            if (!("geolocation" in navigator)) {
                setStatus("Geolocation not supported.");
                return;
            }

            setStatus("Requesting location…");
            locateBtn.disabled = true;

            navigator.geolocation.watchPosition(handlePosition, handleError, {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 10000
            });
        }

        // Clear button
        clearBtn.addEventListener("click", () => {
            const confirmation = prompt("Type 'yes' to confirm clearing everything:");
            if (confirmation === "yes") {
                historyPoints = [];
                if (pathLine) pathLine.setLatLngs([]);
                svgOverlays.forEach(overlay => map.removeLayer(overlay));
                svgOverlays = [];
                if (placementOverlay) {
                    placementOverlay = null;
                    map.off('move', mapMoveHandler);
                    placeBtn.style.display = "none";
                }
            }
        });

        // Upload button
        uploadBtn.addEventListener("click", () => {
            uploadSvg.click();
        });

        uploadSvg.addEventListener("change", (event) => {
            const file = event.target.files[0];
            currentUploadedFile = file; // Store the file
            if (!file) return;
            if (!map) {
                alert("Map not initialized. Please locate first.");
                return;
            }
            const url = URL.createObjectURL(file);
            const overlay = L.imageOverlay(url, map.getBounds()).addTo(map);
            svgOverlays.push(overlay);
            placementOverlay = overlay;
            map.on('move', mapMoveHandler);
            placeBtn.style.display = "inline";
        });

        // Adjust bounds button: show dropdown then let user confirm
        adjustBtn.addEventListener("click", () => {
            if (svgOverlays.length === 0) {
                alert("No overlays to adjust.");
                return;
            }
            // Populate select
            overlaySelect.innerHTML = '';
            svgOverlays.forEach((ov, i) => {
                const option = document.createElement("option");
                option.value = i;
                option.text = `Overlay ${i + 1}`;
                overlaySelect.appendChild(option);
            });
            adjustUI.style.display = "block";
            // on mobile automatically open native picker
            overlaySelect.focus();
            overlaySelect.click();
        });

        // Start adjust button
        startAdjustBtn.addEventListener("click", () => {
            const idx = parseInt(overlaySelect.value);
            if (isNaN(idx) || idx < 0 || idx >= svgOverlays.length) {
                alert("Invalid overlay selected.");
                return;
            }
            placementOverlay = svgOverlays[idx];
            currentUploadedFile = null; // Clear file reference when adjusting
            map.on('move', mapMoveHandler);
            placeBtn.style.display = "inline";
            adjustUI.style.display = "none";
        });

        // Place button
        placeBtn.addEventListener("click", () => {
            if (placementOverlay) {
                // Save to localStorage only if this is a freshly uploaded SVG
                if (currentUploadedFile) {
                    saveSvgToStorage(currentUploadedFile, placementOverlay.getBounds());
                }

                placementOverlay = null;
                currentUploadedFile = null;
                map.off('move', mapMoveHandler);
                placeBtn.style.display = "none";
                adjustUI.style.display = "none";
            }
        });

        locateBtn.addEventListener("click", startTracking);

        // Screen Wake Lock
        let wakeLock = null;

        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    wakeLock.addEventListener('release', () => {
                        console.log('Screen Wake Lock released.');
                    });
                    console.log('Screen Wake Lock acquired.');
                } catch (err) {
                    console.log('Wake Lock error:', err.message);
                }
            } else {
                console.log('Screen Wake Lock API not supported.');
            }
        }

        // Release wake lock on page hide, reacquire on visible
        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'hidden') {
                try {
                    await wakeLock.release();
                    wakeLock = null;
                } catch (e) { }
            } else if (wakeLock === null && document.visibilityState === 'visible') {
                requestWakeLock();
            }
        });

        requestWakeLock()
    </script>
</body>

</html>
